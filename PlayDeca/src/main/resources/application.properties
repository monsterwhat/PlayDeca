# Quarkus configuration
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.quarkus-faces/quarkus-faces;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# HTTP configuration
quarkus.http.port=8080
quarkus.http.root-path=/

# Extensionless URL mapping (removes .xhtml from URLs)
jakarta.faces.AUTOMATIC_EXTENSIONLESS_MAPPING=true

# Additional configuration for extensionless mapping
quarkus.http.filter-mappings=/*=/index

# Logging configuration
quarkus.log.level=INFO
quarkus.log.category."org.h2".level=WARN
quarkus.log.category."org.hibernate".level=WARN

# MyFaces/PrimeFaces Configuration - reduce logging noise
org.apache.myfaces.LOG_WEB_CONTEXT_PARAMS=false
org.apache.myfaces.ERROR_HANDLING=false
org.apache.myfaces.TEMPORAL_RESOURCEHANDLER_CACHE_ENABLED=false

# PrimeFaces Configuration
primefaces.theme=bootstrap
primefaces.cookiessamesite=Strict
primefaces.uploader=auto
primefaces.dir=ltr
primefaces.locale=en

