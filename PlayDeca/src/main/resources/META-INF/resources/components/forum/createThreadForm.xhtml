<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
          
    
    <h:form id="CreateThread">
        <p:dialog id="threadDialogCreate" header="Create New Thread" class="has-text-centered" widgetVar="threadDialogCreate" modal="true" responsive="true" showEffect="fade" hideEffect="fade">
            <div class="notification has-text-centered">
                <div class="columns">
                    <div class="column">
                        <h:outputLabel styleClass="label is-centered" for="ThreadTitle" value="Thread Title: "/>
                    </div>
                </div>
                <div class="columns">
                    <div class="column">
                        <p:inputText class="input" id="ThreadTitle" value="#{ThreadController.newThread.title}" required="true" />
                    </div>
                </div>
                <div class="buttons is-centered">
                    <p:commandButton styleClass="button is-fullwidth is-small is-rounded is-link is-responsive" value="Create Thread" 
                                     action="#{ThreadController.createThread}" onclick="PF('threadDialogCreate').hide();" update=":threadsForm:threadsScroller"/>
                    <p:commandButton styleClass="button is-fullwidth is-small is-rounded is-danger is-responsive" value="Cancel" onclick="PF('threadDialogCreate').hide();" />
                </div>
            </div>
        </p:dialog>
    </h:form>
    
</ui:composition>
