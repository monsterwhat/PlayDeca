<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<div data-theme="light" class="mc-navbar">
    <nav class="navbar" style="background: transparent;">
      <div class="navbar-brand">
        <a class="navbar-item" href="https://playdeca.com/">
          <img src="/assets/images/logos/PlayDecaBannerPNG_decagon.png" alt="Server Banner" width="28" height="28" />
        </a>
        <div class="navbar-burger burger" data-target="navbarMainMC">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div id="navbarMainMC" class="navbar-menu" style="background: transparent;">
        <div class="navbar-start">
          <a class="mc-button" href="/index">Home</a>
          <a class="mc-button" href="/test">Test</a>
          <a class="mc-button" href="/info">Information</a>
          <a class="mc-button" href="/vote">Vote</a>
          <a class="mc-button" href="/forums">Forums</a>
          <a class="mc-button" href="/purchase">Purchase</a>
        </div>

        <div class="navbar-end">
          <div class="navbar-item">
            <div class="field is-grouped">
              <p class="control">
                <a class="mc-button" href="https://discord.com/invite/4KtEsPF" target="_blank">
                  <span class="icon">
                    <i class="fab fa-discord"></i>
                  </span>
                </a>
              </p>
              <p class="control">
                <a class="mc-button" href="https://playdeca.com:8123" target="_blank">
                  <span class="icon">
                    <i class="fas fa-map"></i>
                  </span>
                </a>
              </p>
              
              <p:outputPanel rendered="#{not SessionController.isValid()}">
                <p class="control">
                  <a class="mc-button" href="/login">
                    <span class="icon">
                      <i class="fa-solid fa-right-to-bracket"></i>
                    </span>
                    <span>Log In</span>
                  </a>
                </p>
              </p:outputPanel>
              
              <p:outputPanel rendered="#{SessionController.isValid()}">
                <p class="control">
                  <a class="mc-button" href="/user-profile">
                    <span class="icon">
                      <i class="fa-solid fa-user"></i>
                    </span>
                    <span>Profile</span>
                  </a>
                </p>
              </p:outputPanel>
              
            </div>
          </div>
        </div>
      </div>
      
    </nav>
  </div>

</ui:composition>
