<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" data-theme="light"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  
  <!-- SEO Meta Tags -->
  <title>PlayDeca - Login and Register | Join Our Minecraft Community</title>
  <meta name="description" content="Login or register for PlayDeca Minecraft server. Join our historic community that has been running since 2011 (formerly Zarkov and Octa.in)."/>
  <meta name="keywords" content="PlayDeca login, PlayDeca register, Minecraft account, Zarkov, Octa.in"/>
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://playdeca.com/login"/>
  
  <script src="js/navbar.js"></script>
  <link rel="stylesheet" href="css/bulma.min.css"/>
  <link rel="stylesheet" href="css/primeicons.min.css"/>
  <link rel="stylesheet" type="text/css" href="css/style.css" />
  <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon" />
</h:head>

<h:body>
    <div class="bg"></div>
    <ui:include src="components/navbar.xhtml"/>

    <!-- Modern Login Page -->
    <section class="hero is-fullheight is-overlay">
        <div class="hero-body">
            <div class="container">
                <div class="columns is-centered">
                    <div class="column is-full-widescreen is-four-fifths-desktop is-five-sixths-tablet is-full-mobile">

                        <!-- Logo -->
                        <div class="has-text-centered mb-4 mt-1">
                            <img src="./assets/images/logos/PlayDecaBannerPNG.png" alt="PlayDeca Logo" class="logo-main"/>
                            <h1 class="title has-text-white is-3">Login and Register</h1>
                        </div>

                        <!-- Login/Register Content Area -->
                        <div class="content-area">
                            <div class="content-card">
                                <div class="card-header">
                                    <h3 class="title is-5 has-text-white">🔐 Account Access</h3>
                                </div>
                                <div class="card-body">
                                    <div class="columns is-centered">
                                        <p:growl id="growl" showDetail="true" />
                                        
                                        <p:outputPanel id="dynamicContent">
                                            
                                            <ui:fragment rendered="#{SessionController.selectedOption eq 'login'}">
                                                <ui:include src="./components/user/loginForm.xhtml"/>
                                            </ui:fragment>
                                            
                                            <ui:fragment rendered="#{SessionController.selectedOption eq 'register'}">
                                                <ui:include src="./components/user/registerForm.xhtml"/>
                                            </ui:fragment>

                                        </p:outputPanel>               
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <style>
        /* Ensure login/register toggle links are visible */
        .content-card .card-body .has-text-link {
            display: block !important;
            text-align: center !important;
            margin-top: 20px !important;
            color: #3273dc !important;
            text-decoration: none !important;
            font-weight: 500 !important;
            transition: color 0.3s ease !important;
        }

        .content-card .card-body .has-text-link:hover {
            color: #209cee !important;
            text-decoration: underline !important;
        }
    </style>
  </h:body>
</html>
