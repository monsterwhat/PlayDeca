<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" data-theme="light"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Free Bulma template</title>
    <script src="https://kit.fontawesome.com/b6932e9e3a.js" crossorigin="anonymous"></script>
    <script src="js/navbar.js"></script>
    <!-- Bulma Version 0.9.4-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"/>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon" />

</h:head>

<h:body>
    <div class="bg"></div>
    <!-- Authentication and Authorization Check -->
    <p:outputPanel rendered="#{!SessionController.isLoggedIn()}">
        <script>
            window.location.href = '#{facesContext.externalContext.requestContextPath}/login.xhtml';
        </script>
    </p:outputPanel>
    
    <p:outputPanel rendered="#{!SessionController.isAdmin() and SessionController.isLoggedIn()}">
        <div class="section">
            <div class="container">
                <div class="notification is-danger">
                    <h1 class="title">Access Denied</h1>
                    <p>You don't have permission to access the admin dashboard.</p>
                    <p:commandButton value="Go Home" action="#{SessionController.navigateToHome}" styleClass="button is-primary"/>
                </div>
            </div>
        </div>
    </p:outputPanel>
 
    <h:form id="NavForm" rendered="#{SessionController.isAdmin()}">
        <ui:include src="components/navbar.xhtml"/>
    </h:form>

    <section class="section is-overlay" rendered="#{SessionController.isAdmin()}">
        
    <div class="container notification" style="top: 50px">
        
        <p:outputPanel id="AdminMain">
            
            <ui:fragment rendered="#{DashboardController.view eq 'Home'}">
                <ui:include src="components/admin/adminDashboardHome.xhtml"/>
            </ui:fragment>

            <!-- USER -->
            <ui:fragment rendered="#{DashboardController.view eq 'UsersTable'}">
                <ui:include src="components/admin/forms/View/UsersTable.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'UsersCreateForm'}">
                <ui:include src="components/admin/forms/Create/UsersCreateForm.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'UsersUpdateForm'}">
                <ui:include src="components/admin/forms/Update/UsersUpdateForm.xhtml"/>
            </ui:fragment>

            <!-- THREADS -->
            <ui:fragment rendered="#{DashboardController.view eq 'ThreadsTable'}">
                <ui:include src="components/admin/forms/View/ThreadsTable.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'ThreadsCreateForm'}">
                <ui:include src="components/admin/forms/Create/ThreadsCreateForm.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'ThreadsUpdateForm'}">
                <ui:include src="components/admin/forms/Update/ThreadsUpdateForm.xhtml"/>
            </ui:fragment>

            <!-- PRODUCTS -->
            <ui:fragment rendered="#{DashboardController.view eq 'ProductsTable'}">
                <ui:include src="components/admin/forms/View/ProductsTable.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'ProductsCreateForm'}">
                <ui:include src="components/admin/forms/Create/ProductsCreateForm.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'ProductsUpdateForm'}">
                <ui:include src="components/admin/forms/Update/ProductsUpdateForm.xhtml"/>
            </ui:fragment>

            <!-- POSTS -->
            <ui:fragment rendered="#{DashboardController.view eq 'PostsTable'}">
                <ui:include src="components/admin/forms/View/PostsTable.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'PostsCreateForm'}">
                <ui:include src="components/admin/forms/Create/PostsCreateForm.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'PostsUpdateForm'}">
                <ui:include src="components/admin/forms/Update/PostsUpdateForm.xhtml"/>
            </ui:fragment>

            <!-- ORDERS -->
            <ui:fragment rendered="#{DashboardController.view eq 'OrdersTable'}">
                <ui:include src="components/admin/forms/View/OrdersTable.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'OrdersCreateForm'}">
                <ui:include src="components/admin/forms/Create/OrdersCreateForm.xhtml"/>
            </ui:fragment>
            
            <ui:fragment rendered="#{DashboardController.view eq 'OrdersUpdateForm'}">
                <ui:include src="components/admin/forms/Update/OrdersUpdateForm.xhtml"/>
            </ui:fragment>
            
            <ui:include src="components/admin/popups/dataTableDialogs.xhtml"/>
            <ui:include src="components/admin/popups/dataTablesForm.xhtml"/>
            
        </p:outputPanel>

    </div>
        

        
    </section>
    


</h:body>

</html>
